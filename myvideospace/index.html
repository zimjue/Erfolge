<!doctype html>
<html lang="de">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MyVideoSpace – Organisiere deine Video Playlists</title>

<meta name="description" content="Organisiere YouTube Videos in Playlists und verfolge wie oft du Trainings-, Lern- oder Yogavideos anschaust.">

<meta name="theme-color" content="#0b1220">
<meta name="robots" content="index,follow">

<link rel="canonical" href="https://zimjue.github.io/apps/myvideospace/">

<meta property="og:title" content="MyVideoSpace – Video Playlists organisieren">
<meta property="og:description" content="Organisiere deine Lieblingsvideos und verfolge Trainings- und Lernvideos.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://zimjue.github.io/apps/myvideospace/">
<meta property="og:image" content="https://zimjue.github.io/apps/myvideospace/assets/icon.png">

<style>

:root{
--bg:#0b1220;
--text:#eaf0ff;
--muted:#b7c2e1;
--accent:#66e3ff;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:
radial-gradient(900px 500px at 10% 10%,rgba(102,227,255,.15),transparent 55%),
var(--bg);
color:var(--text);
}

.wrap{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.brand{
font-weight:600;
}

.lang-switch{
display:flex;
gap:10px;
}

.lang-btn{
padding:8px 12px;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
background:transparent;
color:var(--text);
cursor:pointer;
}

.lang-btn.active{
background:var(--accent);
color:#000;
border:none;
}

header{
text-align:center;
margin-bottom:50px;
}

h1{
font-size:40px;
margin:0 0 12px;
}

.subtitle{
color:var(--muted);
font-size:18px;
max-width:700px;
margin:auto;
}

.hero{
text-align:center;
margin-bottom:50px;
}

.hero img{
width:180px;
border-radius:28px;
box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.store-btn{
display:inline-block;
margin-top:28px;
padding:14px 22px;
border-radius:14px;
background:var(--accent);
color:#000;
font-weight:600;
text-decoration:none;
}

.slider{
margin-top:60px;
text-align:center;
}

.slide-frame{
max-width:360px;
margin:auto;
}

.slide-frame img{
width:100%;
border-radius:16px;
}

.slide-caption{
margin-top:12px;
color:var(--muted);
font-size:16px;
}

.slide-btn{
margin:20px 10px;
padding:10px 16px;
border-radius:10px;
border:none;
background:var(--accent);
cursor:pointer;
}

footer{
margin-top:70px;
text-align:center;
font-size:13px;
color:var(--muted);
}

footer a{
color:var(--muted);
text-decoration:none;
}

footer a:hover{
text-decoration:underline;
color:var(--text);
}

.back{
margin-top:30px;
display:inline-block;
color:var(--muted);
text-decoration:none;
}

</style>

</head>

<body>

<div class="wrap">

<div class="topbar">

<div class="brand">MyVideoSpace</div>

<div class="lang-switch">
<button class="lang-btn active" onclick="setLang('de')" id="btn-de">DE</button>
<button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
</div>

</div>

<header>

<h1>MyVideoSpace</h1>

<div class="subtitle" id="subtitle">
Organisiere YouTube Videos in Playlists und verfolge wie oft du Trainings- oder Lernvideos anschaust.
</div>

</header>

<section class="hero">

<img src="assets/icon.png" alt="App Icon">

<br>

<a class="store-btn" id="download">
Download im App Store
</a>

</section>

<section class="slider">

<div class="slide-frame">

<img id="slider-image" src="assets/screenshot1.png">

<div class="slide-caption" id="slide-caption">
Startbildschirm
</div>

</div>

<div>

<button class="slide-btn" onclick="prevSlide()">◀</button>
<button class="slide-btn" onclick="nextSlide()">▶</button>

</div>

</section>

<footer>

<p>© <span id="year"></span> Jürgen Zimmer</p>

<p>

<a href="datenschutz.html" id="privacy">Datenschutz</a> ·
<a href="support.html">Support</a> ·
<a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" target="_blank">EULA</a>

</p>

<a href="../index.html" class="back">← Alle Apps</a>

</footer>

</div>

<script>

const screenshots=[
"assets/screenshot1.png",
"assets/screenshot2.png",
"assets/screenshot3.png",
"assets/screenshot4.png"
]

const captionsDE=[
"Startbildschirm",
"Dashboard",
"Einstellungen",
"Infobereich"
]

const captionsEN=[
"Home Screen",
"Dashboard",
"Settings",
"Info Section"
]

let currentSlide=0
let lang="de"

function showSlide(){

document.getElementById("slider-image").src=screenshots[currentSlide]

if(lang==="de"){
document.getElementById("slide-caption").textContent=captionsDE[currentSlide]
}else{
document.getElementById("slide-caption").textContent=captionsEN[currentSlide]
}

}

function nextSlide(){
currentSlide=(currentSlide+1)%screenshots.length
showSlide()
}

function prevSlide(){
currentSlide=(currentSlide-1+screenshots.length)%screenshots.length
showSlide()
}

function setLang(l){

lang=l
document.documentElement.lang=l

document.getElementById("btn-de").classList.toggle("active",l==="de")
document.getElementById("btn-en").classList.toggle("active",l==="en")

if(l==="de"){
document.getElementById("subtitle").textContent="Organisiere YouTube Videos in Playlists und verfolge wie oft du Trainings- oder Lernvideos anschaust."
document.getElementById("privacy").textContent="Datenschutz"
document.getElementById("download").textContent="Download im App Store"
}else{
document.getElementById("subtitle").textContent="Organize YouTube videos in playlists and track how often you watch workout or learning videos."
document.getElementById("privacy").textContent="Privacy"
document.getElementById("download").textContent="Download on the App Store"
}

showSlide()

}

document.getElementById("year").textContent=new Date().getFullYear()

</script>

</body>
</html>
